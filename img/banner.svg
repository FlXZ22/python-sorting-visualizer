<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="Sorting Visualizer by Metis">
  <!--
    Banner v3.1 - fix del taglio della lettera finale.
    Non mi affido piu' a 38px esatti per glifo. Uso una clip che arriva fino a 470px
    (con buffer), font-size ridotto a 58 cosi' anche con font piu' larghi ci sta,
    e testo centrato con margine abbondante ai lati.
  -->

  <rect x="0" y="0" width="800" height="240" fill="#000000"/>
  <rect x="6" y="6" width="788" height="228" fill="none" stroke="#ffffff" stroke-width="6"/>
  <rect x="18" y="18" width="764" height="204" fill="none" stroke="#ffffff" stroke-width="2"/>

  <g fill="#ffffff">
    <rect x="30" y="30" width="8" height="8"/><rect x="46" y="30" width="8" height="8"/><rect x="30" y="46" width="8" height="8"/>
    <rect x="762" y="30" width="8" height="8"/><rect x="746" y="30" width="8" height="8"/><rect x="762" y="46" width="8" height="8"/>
    <rect x="30" y="202" width="8" height="8"/><rect x="46" y="202" width="8" height="8"/><rect x="30" y="186" width="8" height="8"/>
    <rect x="762" y="202" width="8" height="8"/><rect x="746" y="202" width="8" height="8"/><rect x="762" y="186" width="8" height="8"/>
  </g>

  <!--
    Titolo "SORTING.EXE" font-size 58.
    Clip reveal a 12 step con buffer: ultimo step arriva a 480 (largo)
    cosi' anche se il font e' piu' largo del previsto, la E finale e' sempre visibile.
    start x = 175 (centrato con margine)
  -->
  <defs>
    <clipPath id="titleClip">
      <rect x="170" y="90" width="0" height="76">
        <animate attributeName="width" dur="1.5s" begin="0.4s" fill="freeze" calcMode="discrete"
                 values="0;42;84;126;168;210;252;294;336;378;420;480"
                 keyTimes="0;0.09;0.18;0.27;0.36;0.45;0.54;0.63;0.72;0.81;0.90;1"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#titleClip)">
    <text x="175" y="148" font-family="'Courier New', Courier, monospace" font-size="58" font-weight="900"
          fill="#ffffff" letter-spacing="0" xml:space="preserve">SORTING.EXE</text>
  </g>

  <!-- Cursore giallo, avanza ~40px per lettera, si ferma dopo l'ultima -->
  <rect x="170" y="100" width="12" height="52" fill="#FFD400">
    <animate attributeName="x" dur="1.5s" begin="0.4s" fill="freeze" calcMode="discrete"
             values="170;212;254;296;338;380;422;464;506;548;590;620"
             keyTimes="0;0.09;0.18;0.27;0.36;0.45;0.54;0.63;0.72;0.81;0.90;1"/>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="0.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="400" y="185" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="4" opacity="0" xml:space="preserve">BUBBLE / MERGE / QUICK / SELECTION<animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.4s" fill="freeze"/></text>

  <!-- Loading bar decorativa -->
  <rect x="200" y="200" width="400" height="6" fill="none" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.2s" fill="freeze"/>
  </rect>
  <rect x="202" y="202" width="0" height="2" fill="#FFD400">
    <animate attributeName="width" from="0" to="396" begin="2.4s" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- Brand -->
  <text x="762" y="230" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="700"
        fill="#FFD400" text-anchor="end" letter-spacing="2" opacity="0" xml:space="preserve">by METIS<animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.4s" fill="freeze"/></text>
</svg>
